
"$schema" = 'https://starship.rs/config-schema.json'

palette = 'gruvbox'

format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[palettes.gruvbox]
bg = '#282828'
fg = '#ebdbb2'
red = '#cc241d'
bright_red = '#fb4934'
green = '#98971a'
bright_green = '#b8bb26'
yellow = '#d79921'
bright_yellow = '#fabd2f'
blue = '#458588'
bright_blue = '#83a598'
purple = '#b16286'
bright_purple = '#d3869b'
aqua = '#689d6a'
bright_aqua = '#8ec07c'
orange = '#d65d0e'
bright_orange = '#fe8019'

[character]
success_symbol = '[❯](bold bright_green)'
error_symbol = '[❯](bold bright_red)'
vimcmd_symbol = '[❮](bold bright_yellow)'

[directory]
style = 'bold bright_blue'
read_only = ' '
truncation_length = 3
truncate_to_repo = true
format = '[$path]($style)[$read_only]($read_only_style) '

[git_branch]
symbol = ' '
style = 'bold bright_purple'
format = '[$symbol$branch]($style) '

[git_status]
style = 'bright_red'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '≠'
ahead = '⇡'
behind = '⇣'
untracked = '?'
modified = '!'
staged = '+'

[cmd_duration]
min_time = 2_000
format = '[$duration](bold bright_yellow) '

[nodejs]
symbol = ' '
style = 'bright_green'
format = '[$symbol($version )]($style)'

[python]
symbol = ' '
style = 'bright_yellow'
format = '[$symbol($version )]($style)'

[rust]
symbol = ' '
style = 'bright_orange'
format = '[$symbol($version )]($style)'

[golang]
symbol = ' '
style = 'bright_aqua'
format = '[$symbol($version )]($style)'
